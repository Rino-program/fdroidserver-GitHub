name: F-Droid CI/CD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 CIリポジトリのチェックアウト
        uses: actions/checkout@v4

      # 1. 本体アプリ側と全く同じ Node.js 20 をセットアップ
      - name: 🟢 Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. 本体アプリ側と全く同じ Java 21 (Temurin) をセットアップ
      - name: ☕ Java (JDK 21) のセットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: ⚙️ fdroidserver のインストール
        run: |
          sudo add-apt-repository -y ppa:fdroid/fdroidserver
          sudo apt-get update
          sudo apt-get install -y fdroidserver

      # 3. F-Droid公式（および本体アプリのActions）と完全に同じ絶対パスのワークスペースを構築
      - name: 🛠️ F-Droid ワークスペースを絶対パスに構築
        run: |
          sudo mkdir -p /builds/Rino-program/fdroiddata
          sudo chown -R $USER:$USER /builds/
          # このCIリポジトリの全ファイル（metadataフォルダなど）を絶対パス側にコピー
          cp -a $GITHUB_WORKSPACE/. /builds/Rino-program/fdroiddata/

      # 4. 作成した絶対パス側で F-Droid を初期化
      - name: 🛠️ F-Droid ワークスペースの初期化
        working-directory: /builds/Rino-program/fdroiddata
        run: |
          fdroid init
          cat <<EOF >> config.py
          sdk_path = "$ANDROID_HOME"
          EOF

      # 5. 作成した絶対パス側でビルドを実行
      # これにより fdroid は `/builds/Rino-program/fdroiddata/build/io.github.rinoprogram.audiovisualizer` を作ってビルドします
      - name: 🚀 F-Droid ビルドの実行
        working-directory: /builds/Rino-program/fdroiddata
        run: |
          APP_ID="io.github.rinoprogram.audiovisualizer"
          echo "==== $APP_ID のビルドを開始します ===="
          fdroid build -v -l $APP_ID